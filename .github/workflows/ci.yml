name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Check no msfa identifiers
        run: |
          if grep -ri msfa Sources/; then
            echo "ERROR: msfa identifiers found in source code"
            exit 1
          fi
